name: Build Linux for T8010 (LLVM)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Clone Linux Kernel
        run: |
          git clone --depth 1 https://github.com/HoolockLinux/linux.git kernel
          
      - name: Copy Config
        run: cp arch/arm64/configs/t8010_defconfig kernel/arch/arm64/configs/
      
      - name: Build Kernel
        run: |
          cd kernel
          export ARCH=arm64
          sudo apt-get update -qq && sudo apt-get install -y -qq clang lld flex bison bc
          make LLVM=1 t8010_defconfig
          make LLVM=1 -j$(nproc) Image.gz dtbs
          
      - name: Package
        run: |
          mkdir out
          cp kernel/arch/arm64/boot/Image.gz out/
          cp kernel/arch/arm64/boot/dts/apple/t8010-d11.dtb out/
          
      - uses: actions/upload-artifact@v4
        with:
          name: linux-t8010
          path: out/
